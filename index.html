<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>닌자 아침 미션 🥷</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --dark:#0D1117;--darker:#080B0F;--panel:#161C26;--panel2:#1E2736;
  --accent:#00E5FF;--accent2:#FF6B00;--green:#39FF14;--gold:#FFD600;
  --border:rgba(0,229,255,0.2);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--darker);color:white;font-family:'Noto Sans KR',sans-serif;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:9999;}

/* ── LAYOUT ── */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}

/* ── HEADER ── */
.hdr{
  flex-shrink:0;
  background:var(--dark);border-bottom:2px solid var(--accent);
  padding:10px 16px 10px;position:relative;overflow:hidden;
}
.hdr-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,229,255,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.05) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;}
.hdr-glow{position:absolute;inset:0;background:radial-gradient(ellipse at 80% 30%,rgba(0,229,255,0.1) 0%,transparent 60%);pointer-events:none;}
.hdr-inner{position:relative;z-index:2;}
.hdr-clock-row{text-align:center;margin-bottom:6px;}
.big-clock{font-family:'Black Han Sans',sans-serif;font-size:52px;color:var(--accent);letter-spacing:4px;text-shadow:0 0 24px rgba(0,229,255,0.5);line-height:1;}
.date-lbl{font-size:11px;color:rgba(255,255,255,0.35);letter-spacing:2px;margin-top:2px;}
.hdr-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.title{font-family:'Black Han Sans',sans-serif;font-size:18px;line-height:1.1;cursor:pointer;color:white;border-bottom:1px dashed rgba(255,255,255,0.2);padding-bottom:1px;transition:border-color .2s;}
.title:hover{border-color:var(--accent);}
.title-input{font-family:'Black Han Sans',sans-serif;font-size:18px;background:transparent;border:none;border-bottom:2px solid var(--accent);color:white;outline:none;width:100%;padding-bottom:1px;letter-spacing:.5px;}
.hdr-row2{display:flex;gap:10px;align-items:center;}
.power-bar-wrap{flex:1;height:8px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;border:1px solid rgba(255,255,255,0.1);}
.power-bar-fill{height:100%;background:linear-gradient(90deg,#00E5FF,#39FF14);border-radius:2px;transition:width .5s ease;box-shadow:0 0 6px rgba(0,229,255,0.5);}
.power-lbl{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--accent);}
.power-count{font-size:11px;color:rgba(255,255,255,0.45);font-weight:700;white-space:nowrap;}
.pts-row{display:flex;gap:8px;margin-top:8px;}
.pts-chip{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:6px 10px;position:relative;overflow:hidden;}
.pts-chip::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;}
.pts-chip.gold::before{background:var(--gold);}
.pts-chip.cyan::before{background:var(--accent);}
.pts-lbl{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.35);font-weight:700;}
.pts-val{font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--gold);}
.pts-val.cyan{color:var(--accent);}
.pts-sub{font-size:9px;color:rgba(255,255,255,0.3);margin-top:1px;}
.reward-bar{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;margin-top:4px;}
.reward-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .5s ease;box-shadow:0 0 4px rgba(255,214,0,0.5);}
.edit-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:6px 10px;color:rgba(255,255,255,0.5);font-size:12px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;}
.edit-btn:active{background:rgba(255,255,255,0.14);}

/* ── MISSION AREA ── */
.mission-area{flex:1;display:flex;flex-direction:column;padding:10px 12px;gap:6px;overflow:hidden;min-height:0;}
.section-row{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.section-txt{font-size:9px;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,0.3);}
.section-line{flex:1;height:1px;background:var(--border);}
.done-strip{display:flex;flex-wrap:wrap;gap:5px;flex-shrink:0;}
.done-chip{display:inline-flex;align-items:center;gap:3px;background:rgba(57,255,20,0.07);border:1px solid rgba(57,255,20,0.2);border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;color:rgba(57,255,20,0.6);text-decoration:line-through;}
.cards-wrap{flex:1;display:flex;flex-direction:column;gap:8px;justify-content:center;min-height:0;overflow:hidden;}

/* ── TASK CARD ── */
.task-card{
  background:var(--panel);border:1px solid rgba(255,255,255,0.08);border-radius:10px;
  padding:13px 14px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:all .25s ease;position:relative;overflow:hidden;
  user-select:none;-webkit-user-select:none;
  animation:card-in .3s ease both;
}
@keyframes card-in{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.task-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:rgba(255,255,255,0.08);transition:background .3s;}
.task-card:active{transform:scale(0.97);}
.task-card.current{border-color:var(--accent);box-shadow:0 0 18px rgba(0,229,255,0.12);}
.task-card.current::before{background:var(--accent);box-shadow:0 0 8px var(--accent);}
.task-card.upcoming{opacity:0.5;}
.task-card.done{background:rgba(57,255,20,0.06);border-color:rgba(57,255,20,0.25);opacity:0.7;}
.task-card.done::before{background:var(--green);}
.task-card.done .task-name{text-decoration:line-through;color:rgba(255,255,255,0.35);}
.emoji-box{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:var(--panel2);border:1px solid rgba(255,255,255,0.08);transition:transform .3s;}
.task-card.done .emoji-box{transform:scale(1.05);}
.task-info{flex:1;min-width:0;}
.task-num{font-size:9px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.2);margin-bottom:2px;}
.task-name{font-size:15px;font-weight:700;color:white;transition:all .3s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.task-time{font-size:10px;color:rgba(255,255,255,0.3);margin-top:2px;min-height:14px;letter-spacing:1px;}
.task-card.done .task-time{color:var(--green);}
.task-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.task-pts{font-size:10px;font-weight:700;color:var(--gold);opacity:.6;}
.task-card.done .task-pts{opacity:0;}
.check-btn{width:32px;height:32px;border-radius:6px;border:1.5px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--panel2);color:transparent;transition:all .3s;}
.task-card.done .check-btn{background:var(--green);border-color:var(--green);color:#000;box-shadow:0 0 10px rgba(57,255,20,0.4);}

/* outfit */
.outfit-sel{background:var(--darker);border-radius:6px;padding:7px 9px;margin:5px 0 1px;border:1px solid var(--border);}
.outfit-lbl{font-size:9px;color:rgba(255,255,255,0.3);margin-bottom:5px;letter-spacing:1px;}
.outfit-btns{display:flex;gap:6px;}
.outfit-btn{flex:1;padding:6px;border-radius:5px;border:1px solid rgba(255,255,255,0.15);background:var(--panel2);font-size:11px;font-weight:700;color:rgba(255,255,255,0.5);cursor:pointer;text-align:center;font-family:'Noto Sans KR',sans-serif;transition:all .2s;}
.outfit-btn.selected{border-color:var(--accent);background:rgba(0,229,255,0.1);color:var(--accent);}

/* remaining hint */
.remaining-hint{text-align:center;font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,0.2);flex-shrink:0;padding:2px 0;}

/* ── LEGO TOP BAR ── */
.lego-top-bar{
  display:flex;justify-content:center;align-items:center;
  flex-shrink:0;padding:6px 0 4px;
  border-bottom:1px solid rgba(255,255,255,0.06);
  margin-bottom:4px;
}
.lego-top-inner{
  display:flex;align-items:center;gap:10px;
  background:var(--panel);border:1px solid var(--border);border-radius:14px;
  padding:8px 16px 8px 12px;
}
.lego-svg-top{width:56px;height:94px;overflow:visible;flex-shrink:0;}
.lego-top-meta{display:flex;flex-direction:column;gap:3px;}
.lego-fig-label{
  font-family:'Black Han Sans',sans-serif;font-size:13px;
  color:var(--gold);letter-spacing:1px;
  text-shadow:0 0 8px rgba(255,214,0,0.35);
}
.lego-fig-progress{font-size:11px;font-weight:700;color:var(--accent);}

/* ── PART UNLOCK POPUP ── */
.part-popup{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:var(--panel);border:2px solid var(--gold);border-radius:20px;
  padding:18px 24px;text-align:center;z-index:2000;
  box-shadow:0 0 40px rgba(255,214,0,0.25),0 20px 50px rgba(0,0,0,0.7);
  transition:transform .4s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;min-width:200px;
}
.part-popup.show{transform:translate(-50%,-50%) scale(1);}
.part-popup-svg{width:70px;height:70px;overflow:visible;display:block;margin:0 auto 8px;}
.part-popup-title{
  font-family:'Black Han Sans',sans-serif;font-size:16px;
  color:var(--gold);letter-spacing:1px;
  text-shadow:0 0 12px rgba(255,214,0,0.5);margin-bottom:3px;
}
.part-popup-msg{font-size:12px;color:rgba(255,255,255,0.6);}

/* split layout */
.split-row{flex:1;display:flex;gap:8px;min-height:0;}
.cards-col{flex:1;display:flex;flex-direction:column;gap:8px;min-height:0;min-width:0;}
.right-panel{width:54px;display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;min-height:0;}
.sidebar-label{font-size:8px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,0.25);text-align:center;flex-shrink:0;padding:2px 0;}
.sidebar-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px;padding:2px 0;scrollbar-width:none;min-height:0;}
.sidebar-list::-webkit-scrollbar{display:none;}
.sb-item{
  width:44px;height:44px;border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  background:var(--panel);border:1px solid rgba(255,255,255,0.08);
  cursor:grab;transition:background .2s,border .2s,opacity .2s,transform .15s;flex-shrink:0;position:relative;
  font-size:20px;touch-action:none;
}
.sb-item.sb-done{background:rgba(57,255,20,0.08);border-color:rgba(57,255,20,0.25);cursor:default;}
.sb-item.sb-done::after{content:'✓';position:absolute;bottom:1px;right:3px;font-size:9px;font-weight:900;color:var(--green);}
.sb-item.sb-active{border-color:var(--accent);box-shadow:0 0 10px rgba(0,229,255,0.2);}
.sb-item.sb-dragging{opacity:.35;transform:scale(.9);}
.sb-item.sb-over{border-color:var(--accent2);box-shadow:0 0 10px rgba(255,107,0,0.4);transform:scale(1.08);}
.sb-ghost{
  position:fixed;width:44px;height:44px;border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  background:var(--panel2);border:2px solid var(--accent);
  font-size:20px;pointer-events:none;z-index:3000;
  box-shadow:0 6px 24px rgba(0,229,255,0.3);
  transition:none;opacity:.95;
}
.sb-num{font-size:7px;font-weight:700;color:rgba(255,255,255,0.25);letter-spacing:1px;}
.sidebar-hint{font-size:7px;color:rgba(255,255,255,0.18);text-align:center;letter-spacing:.5px;padding:2px 0;flex-shrink:0;}

/* ── PRAISE TOAST ── */
.praise-toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  background:var(--panel);border:2px solid var(--accent);border-radius:16px;
  padding:22px 28px;text-align:center;
  box-shadow:0 0 40px rgba(0,229,255,0.25),0 20px 60px rgba(0,0,0,0.7);
  z-index:1500;transition:all .4s cubic-bezier(.34,1.56,.64,1);min-width:240px;pointer-events:none;
}
.praise-toast.show{transform:translate(-50%,-50%) scale(1);}
.praise-emoji{font-size:48px;display:block;margin-bottom:8px;animation:bounce .4s ease infinite alternate;}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-7px)}}
.praise-text{font-family:'Black Han Sans',sans-serif;font-size:20px;color:var(--accent);text-shadow:0 0 14px rgba(0,229,255,0.5);margin-bottom:4px;}
.praise-sub{font-size:12px;color:var(--gold);font-weight:700;}

/* ── COMPLETE ── */
.complete-screen{
  position:fixed;inset:0;background:var(--darker);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:1200;transform:translateY(100%);transition:transform .5s cubic-bezier(.34,1.56,.64,1);
  padding:28px;text-align:center;overflow:hidden;
}
.complete-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(0,229,255,0.18) 0%,transparent 55%),radial-gradient(ellipse at 50% 100%,rgba(255,107,0,0.12) 0%,transparent 55%);}
.c-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,229,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.04) 1px,transparent 1px);background-size:28px 28px;}
.complete-screen.show{transform:translateY(0);}
.c-inner{position:relative;z-index:2;width:100%;}
.c-badge{display:inline-block;background:rgba(255,107,0,0.18);border:1px solid var(--accent2);border-radius:4px;padding:3px 12px;font-size:10px;font-weight:700;color:var(--accent2);letter-spacing:3px;margin-bottom:14px;}
.c-emoji{font-size:64px;margin-bottom:12px;animation:float 2s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.c-title{font-family:'Black Han Sans',sans-serif;font-size:34px;color:var(--accent);text-shadow:0 0 28px rgba(0,229,255,0.5);margin-bottom:6px;letter-spacing:2px;}
.c-sub{font-size:14px;color:rgba(255,255,255,0.65);margin-bottom:4px;}
.c-time{font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:2px;margin-bottom:24px;}
.c-btn1{background:var(--accent);color:#000;border:none;border-radius:10px;padding:15px 28px;font-size:16px;font-weight:900;font-family:'Noto Sans KR',sans-serif;cursor:pointer;box-shadow:0 0 18px rgba(0,229,255,0.35);transition:transform .2s;margin-bottom:10px;display:block;width:100%;}
.c-btn1:active{transform:scale(.95);}
.c-btn2{background:transparent;color:rgba(255,255,255,0.35);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:10px 20px;font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;width:100%;}

/* ── EDIT PANEL ── */
.edit-panel{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1100;display:none;flex-direction:column;}
.edit-panel.show{display:flex;}
.edit-header{background:var(--dark);border-bottom:2px solid var(--accent);padding:16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.edit-title{font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--accent);}
.edit-close{background:var(--accent);border:none;border-radius:6px;color:#000;padding:6px 14px;font-size:13px;font-weight:900;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.edit-cancel{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:rgba(255,255,255,0.5);padding:6px 12px;font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.edit-card.edit-dragging{opacity:.4;background:var(--panel2);}
.edit-card.edit-over{border-color:var(--accent2);box-shadow:0 0 8px rgba(255,107,0,0.3);}
.edit-body{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.edit-card{background:var(--panel);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;}
.edit-card .emoji-pick{font-size:22px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:var(--panel2);border:1px solid rgba(255,255,255,0.1);border-radius:7px;cursor:pointer;flex-shrink:0;}
.edit-card input{flex:1;background:var(--panel2);border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:white;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;padding:7px 10px;outline:none;}
.edit-card input:focus{border-color:var(--accent);}
.edit-del{background:rgba(255,45,45,0.15);border:1px solid rgba(255,45,45,0.3);border-radius:6px;color:rgba(255,100,100,0.8);padding:6px 8px;font-size:12px;cursor:pointer;flex-shrink:0;}
.edit-drag{color:rgba(255,255,255,0.2);font-size:16px;cursor:grab;padding:0 4px;flex-shrink:0;}
.add-mission-row{display:flex;gap:8px;flex-shrink:0;padding:0 14px 14px;}
.add-mission-input{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:8px;color:white;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;padding:10px 12px;outline:none;}
.add-mission-input:focus{border-color:var(--accent);}
.add-mission-btn{background:var(--accent);color:#000;border:none;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:900;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;}

/* ── EMOJI PICKER ── */
.emoji-picker{position:fixed;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:0;display:none;flex-direction:column;width:272px;z-index:2000;box-shadow:0 8px 32px rgba(0,0,0,0.6);overflow:hidden;}
.emoji-picker.show{display:flex;}
.ep-tabs{display:flex;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,0.08);scrollbar-width:none;}
.ep-tabs::-webkit-scrollbar{display:none;}
.ep-tab{flex-shrink:0;padding:6px 10px;font-size:10px;font-weight:700;color:rgba(255,255,255,0.4);cursor:pointer;letter-spacing:1px;white-space:nowrap;border-bottom:2px solid transparent;transition:all .15s;}
.ep-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.ep-grid{display:flex;flex-wrap:wrap;gap:3px;padding:8px;max-height:160px;overflow-y:auto;}
.ep-item{font-size:22px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;transition:background .15s;}
.ep-item:hover{background:rgba(255,255,255,0.12);}

/* ── CAMERA ── */
.cam-wrap{position:fixed;inset:0;background:#000;z-index:2100;display:none;flex-direction:column;align-items:center;justify-content:center;}
.cam-wrap.show{display:flex;}
#camVideo{width:100%;max-width:480px;border-radius:14px;max-height:70vh;object-fit:cover;}
.cam-ctrls{display:flex;gap:20px;margin-top:18px;align-items:center;}
.shutter{width:68px;height:68px;border-radius:50%;background:var(--accent);border:4px solid rgba(0,229,255,0.3);cursor:pointer;font-size:26px;display:flex;align-items:center;justify-content:center;transition:transform .15s;box-shadow:0 0 18px rgba(0,229,255,0.4);}
.shutter:active{transform:scale(.9);}
.cam-cancel{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#photoCanvas{display:none;}
.photo-result{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:2200;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.photo-result.show{display:flex;}
#resultImg{max-width:280px;border-radius:12px;border:2px solid var(--accent);box-shadow:0 0 28px rgba(0,229,255,0.25);}
.photo-praise{font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--accent);text-shadow:0 0 14px rgba(0,229,255,0.5);margin:12px 0 6px;text-align:center;letter-spacing:1px;}
.photo-btns{display:flex;gap:10px;margin-top:8px;}
.photo-save{background:var(--accent);color:#000;border:none;border-radius:8px;padding:11px 18px;font-size:13px;font-weight:900;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.photo-close{background:rgba(255,255,255,0.08);color:white;border:1px solid rgba(255,255,255,0.2);border-radius:8px;padding:11px 18px;font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}

/* overlays */
.overlay-bg{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:1400;display:none;}
.overlay-bg.show{display:block;}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:500;overflow:hidden;}
.confetti-piece{position:absolute;animation:cffall linear forwards;}
@keyframes cffall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.pts-float{position:absolute;right:12px;top:6px;font-family:'Black Han Sans',sans-serif;font-size:15px;color:var(--gold);text-shadow:0 0 8px rgba(255,214,0,0.5);animation:ptsfloat 1s ease forwards;pointer-events:none;}
@keyframes ptsfloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-32px)}}
.burst-layer{position:fixed;inset:0;pointer-events:none;z-index:500;}
.burst-p{position:absolute;font-size:18px;animation:burstfly 1s ease forwards;pointer-events:none;}
@keyframes burstfly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-55px) scale(.4)}}

/* ── INTRO SCREEN ── */
.intro-screen{
  position:fixed;inset:0;background:var(--darker);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:5000;cursor:pointer;overflow:hidden;
}
.intro-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,229,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.04) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;}
.intro-glow{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(0,229,255,0.08) 0%,transparent 65%);pointer-events:none;}
.intro-inner{position:relative;z-index:2;text-align:center;padding:32px;}
.intro-icon{font-size:72px;margin-bottom:20px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.intro-title{
  font-family:'Black Han Sans',sans-serif;
  font-size:28px;color:white;letter-spacing:2px;
  margin-bottom:8px;line-height:1.3;
}
.intro-title span{color:var(--accent);text-shadow:0 0 20px rgba(0,229,255,0.6);}
.intro-sub{font-size:13px;color:rgba(255,255,255,0.4);letter-spacing:1px;margin-bottom:40px;}
.intro-tap{
  display:inline-flex;align-items:center;gap:8px;
  border:1.5px solid var(--accent);border-radius:30px;
  padding:14px 28px;
  font-family:'Black Han Sans',sans-serif;
  font-size:16px;color:var(--accent);letter-spacing:2px;
  animation:pulse-border 2s ease-in-out infinite;
}
@keyframes pulse-border{
  0%,100%{box-shadow:0 0 0 0 rgba(0,229,255,0.4);}
  50%{box-shadow:0 0 0 10px rgba(0,229,255,0);}
}
.intro-tap-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.intro-screen.fade-out{animation:intro-fade .6s ease forwards;}
@keyframes intro-fade{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(1.04)}}

/* ── JARVIS GREETING ── */
.jarvis-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.88);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:4000;pointer-events:none;opacity:0;
  transition:opacity .4s ease;
}
.jarvis-overlay.show{opacity:1;}
.jarvis-lines{text-align:center;padding:24px;}
.jarvis-line{
  font-family:'Black Han Sans',sans-serif;
  font-size:22px;color:var(--accent);
  text-shadow:0 0 20px rgba(0,229,255,0.5);
  letter-spacing:2px;line-height:1.6;
  opacity:0;transform:translateY(10px);
  transition:opacity .5s ease,transform .5s ease;
}
.jarvis-line.show{opacity:1;transform:translateY(0);}
.jarvis-scan{width:200px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:16px auto;animation:scan-h 1.5s ease-in-out infinite;opacity:0;transition:opacity .4s;}
.jarvis-scan.show{opacity:1;}
@keyframes scan-h{0%{transform:translateX(-60px)}100%{transform:translateX(60px)}}

/* ── LEGO FIGURE ── */
.lego-wrap{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;flex-shrink:0;
  background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:4px 2px 6px;
}
.lego-svg-mini{width:46px;height:80px;overflow:visible;}
.lego-label{font-size:6px;font-weight:700;letter-spacing:0.5px;color:rgba(0,229,255,0.6);text-align:center;white-space:nowrap;overflow:hidden;max-width:50px;text-overflow:ellipsis;}
.lego-progress{font-size:9px;font-weight:700;color:var(--gold);text-align:center;}
.lego-complete-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin:12px 0;}
.lego-svg-big{width:130px;height:180px;overflow:visible;}
.lego-complete-name{font-family:'Black Han Sans',sans-serif;font-size:16px;color:var(--gold);letter-spacing:2px;text-shadow:0 0 10px rgba(255,214,0,0.4);}

/* ── SETTINGS PANEL (name edit) ── */
.settings-panel{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1100;display:none;flex-direction:column;}
.settings-panel.show{display:flex;}
.settings-header{background:var(--dark);border-bottom:2px solid var(--accent);padding:16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}

function toSpeakable(text){
  // Replace Korean with empty string — keep only ASCII/English
  return text.replace(/[\u3131-\u314e\u314f-\u3163\uac00-\ud7a3]/g, '').trim();
}

// ── STATE ──
function loadTasks(){
  try{
    const s=localStorage.getItem('ninjaTasks');
    if(s) return JSON.parse(s);
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_TASKS));
}
function loadTitle(){
  return localStorage.getItem('ninjaTitle') || '닌자 아침 미션 🥷';
}
function saveTitle(t){ localStorage.setItem('ninjaTitle', t); }
function loadName(){ return localStorage.getItem('ninjaName') || ''; }
function saveName(n){ localStorage.setItem('ninjaName', n); }
function loadVoice(){ return localStorage.getItem('ninjaVoice') !== 'off'; }
function saveVoice(v){ localStorage.setItem('ninjaVoice', v ? 'on' : 'off'); }
function saveTasks(){ localStorage.setItem('ninjaTasks',JSON.stringify(state.tasks)); }

let state = {
  tasks: loadTasks(),
  done: {},
  times: {},
  totalPoints: parseInt(localStorage.getItem('ninjaPoints')||'0'),
  outfitChoice: null,
  appTitle: loadTitle(),
  userName: loadName(),
  voiceEnabled: loadVoice(),
  figureIdx: parseInt(localStorage.getItem('ninjaFigIdx')||Math.floor(Math.random()*20)),
};

// ── CLOCK ──
function krNow(){ return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'})); }
function updateClock(){
  const t=krNow();
  document.getElementById('clockEl').textContent=pad(t.getHours())+':'+pad(t.getMinutes());
  document.getElementById('dateEl').textContent=['일','월','화','수','목','금','토'][t.getDay()]+'요일';
}
function renderTitle(){
  const el=document.getElementById('titleDisplay');
  if(el) el.textContent=state.appTitle;
}
function pad(n){return String(n).padStart(2,'0');}

// ── RENDER ──
function getTodayPts(){
  return state.tasks.reduce((s,t)=>state.done[t.id]?s+t.points:s,0);
}

function updateHeader(){
  const done=Object.values(state.done).filter(Boolean).length;
  const total=state.tasks.length;
  document.getElementById('powerFill').style.width=(total?done/total*100:0)+'%';
  document.getElementById('powerCount').textContent=done+'/'+total;
  const tp=state.totalPoints;
  document.getElementById('totalPtsEl').textContent=tp;
  const inC=tp%REWARD_GOAL;
  document.getElementById('rewardLeftEl').textContent=REWARD_GOAL-inC;
  document.getElementById('rewardFill').style.width=(inC/REWARD_GOAL*100)+'%';
}

function renderMissions(){
  const doneTasks=state.tasks.filter(t=>state.done[t.id]);
  const pending=state.tasks.filter(t=>!state.done[t.id]);

  // done strip
  const strip=document.getElementById('doneStrip');
  strip.innerHTML=doneTasks.map(t=>`<span class="done-chip">${t.emoji} ${t.name}</span>`).join('');

  // cards: show up to 3 pending, any order (they're all clickable)
  const wrap=document.getElementById('cardsWrap');
  wrap.innerHTML='';

  const visible=pending.slice(0,3);
  visible.forEach((task,idx)=>{
    const card=document.createElement('div');
    const isCurrent=idx===0;
    card.className='task-card'+(isCurrent?' current':' upcoming');
    card.id='task-'+task.id;
    card.style.animationDelay=idx*0.06+'s';

    let outfitHtml='';
    if(task.hasOutfit && isCurrent){
      outfitHtml=`<div class="outfit-sel">
        <div class="outfit-lbl">▷ 오늘 복장 선택</div>
        <div class="outfit-btns">
          <button class="outfit-btn${state.outfitChoice==='uniform'?' selected':''}" onclick="selectOutfit('uniform',event)">🏫 교복</button>
          <button class="outfit-btn${state.outfitChoice==='pe'?' selected':''}" onclick="selectOutfit('pe',event)">🩳 체육복</button>
        </div></div>`;
    }

    card.innerHTML=`
      <div class="emoji-box">${task.emoji}</div>
      <div class="task-info">
        <div class="task-num">MISSION ${pad(state.tasks.indexOf(task)+1)}</div>
        <div class="task-name">${task.name}</div>
        ${outfitHtml}
        <div class="task-time"></div>
      </div>
      <div class="task-right">
        <div class="task-pts">+${task.points}</div>
        <div class="check-btn"></div>
      </div>`;

    // ANY pending card is clickable (free order)
    card.addEventListener('click',e=>{
      if(e.target.classList.contains('outfit-btn')) return;
      if(task.hasOutfit && !state.outfitChoice && isCurrent){ shakeFeedback(card); return; }
      checkTask(task);
    });
    wrap.appendChild(card);
  });

  // remaining hint
  const rem=pending.length;
  const hint=document.getElementById('remainHint');
  hint.textContent=rem>3?`▼ 아래 미션 ${rem-3}개 더 있어`:' ';

  // section label
  document.getElementById('sectionLbl').textContent=
    doneTasks.length===0?'⚔ 오늘의 미션':
    pending.length===0?'✓ 모두 완료!':
    `⚔ 미션 진행 중 (${doneTasks.length}/${state.tasks.length})`;

  if(pending.length===0 && state.tasks.length>0) setTimeout(showComplete,800);
}

// ── SIDEBAR DRAG-TO-REORDER ──
let _drag = null; // { taskId, ghost, startY, items }

function renderSidebar(){
  const list = document.getElementById('sidebarList');
  const pending = state.tasks.filter(t=>!state.done[t.id]);
  const firstPendingId = pending.length > 0 ? pending[0].id : null;
  list.innerHTML = '';
  state.tasks.forEach((task, idx) => {
    const isDone = state.done[task.id];
    const isActive = task.id === firstPendingId;
    const item = document.createElement('div');
    item.className = 'sb-item' + (isDone?' sb-done':'') + (isActive&&!isDone?' sb-active':'');
    item.dataset.id = task.id;
    item.title = task.name;
    item.innerHTML = `<span>${task.emoji}</span><div class="sb-num">${String(idx+1).padStart(2,'0')}</div>`;

    if(!isDone){
      // tap = bring to front
      let pressTimer = null;
      let dragged = false;

      const onStart = (e) => {
        dragged = false;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        pressTimer = setTimeout(() => {
          startDrag(task, item, clientX, clientY);
        }, 180);
      };
      const onEnd = (e) => {
        clearTimeout(pressTimer);
        if(!dragged) scrollToOrCheck(task);
      };

      item.addEventListener('mousedown', onStart);
      item.addEventListener('touchstart', onStart, {passive:true});
      item.addEventListener('mouseup', onEnd);
      item.addEventListener('touchend', onEnd);
    }
    list.appendChild(item);
  });
}

function startDrag(task, el, startX, startY){
  _drag = { taskId: task.id, startX, startY, currentIdx: state.tasks.indexOf(task) };

  // ghost
  const r = el.getBoundingClientRect();
  const ghost = document.createElement('div');
  ghost.className = 'sb-ghost';
  ghost.innerHTML = `<span>${task.emoji}</span>`;
  ghost.style.left = r.left + 'px';
  ghost.style.top  = r.top  + 'px';
  document.body.appendChild(ghost);
  _drag.ghost = ghost;
  _drag.el = el;
  el.classList.add('sb-dragging');

  const onMove = (e) => {
    if(!_drag) return;
    _drag.el._dragged = true;
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    ghost.style.top  = (r.top  + cy - startY) + 'px';
    ghost.style.left = (r.left + cx - startX) + 'px';

    // find which sb-item we're hovering
    const list = document.getElementById('sidebarList');
    const items = [...list.querySelectorAll('.sb-item:not(.sb-done)')];
    items.forEach(i => i.classList.remove('sb-over'));
    const under = items.find(i => {
      const ir = i.getBoundingClientRect();
      return cy >= ir.top && cy <= ir.bottom && i !== el;
    });
    if(under){
      under.classList.add('sb-over');
      const toId = parseInt(under.dataset.id);
      const toIdx = state.tasks.findIndex(t=>t.id===toId);
      const fromIdx = state.tasks.findIndex(t=>t.id===_drag.taskId);
      if(toIdx !== -1 && fromIdx !== -1 && toIdx !== fromIdx){
        const arr = state.tasks;
        const [moved] = arr.splice(fromIdx, 1);
        arr.splice(toIdx, 0, moved);
        renderSidebar();
        renderMissions();
        // re-grab el ref after re-render
        const newEl = document.querySelector(`.sb-item[data-id="${_drag.taskId}"]`);
        if(newEl){ newEl.classList.add('sb-dragging'); _drag.el = newEl; }
      }
    }
  };

  const onUp = () => {
    if(!_drag) return;
    document.querySelectorAll('.sb-over').forEach(i=>i.classList.remove('sb-over'));
    document.querySelectorAll('.sb-dragging').forEach(i=>i.classList.remove('sb-dragging'));
    _drag.ghost.remove();
    _drag = null;
    renderSidebar();
    renderMissions();
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup',   onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend',  onUp);
  };

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup',   onUp);
  document.addEventListener('touchmove', onMove, {passive:true});
  document.addEventListener('touchend',  onUp);
}

function scrollToOrCheck(task){
  if(state.done[task.id]) return;
  const pending = state.tasks.filter(t=>!state.done[t.id]);
  const reordered = [task, ...pending.filter(t=>t.id!==task.id)];
  const doneItems = state.tasks.filter(t=>state.done[t.id]);
  state.tasks = [...doneItems, ...reordered];
  renderMissions();
  renderSidebar();
}

// ── CHECK TASK ──
function checkTask(task){
  const prev=state.totalPoints;
  const prevParts = getLegoPartsCount(); // capture BEFORE marking done
  state.done[task.id]=true;
  const t=krNow();
  state.times[task.id]=pad(t.getHours())+':'+pad(t.getMinutes());
  state.totalPoints+=task.points;
  localStorage.setItem('ninjaPoints',state.totalPoints);

  playMissionSound();
  showPtsAnim(task);

  // Check if a new lego part was unlocked — show part popup instead of praise
  const newParts = getLegoPartsCount();
  if(newParts > prevParts){
    setTimeout(()=> showPartPopup(prevParts, newParts, state.figureIdx), 400);
  } else {
    // No new part: just show quick points burst, no toast
    spawnBurst();
  }
  // speak mission complete
  setTimeout(()=>{
    const raw = TASK_EN[task.name] || task.name;
    const en = toSpeakable(raw) || 'Mission';
    const cheers = [
      en + '! Done! Awesome!',
      'Nice job! ' + en + ' complete!',
      en + '? Nailed it! Way to go!',
      'Boom! ' + en + ' finished!',
      'Yes! ' + en + ' — you rock!',
    ];
    speak(cheers[Math.floor(Math.random()*cheers.length)]);
  }, 200);

  if(Math.floor(state.totalPoints/REWARD_GOAL)>Math.floor(prev/REWARD_GOAL))
    setTimeout(showRewardAlert,1400);

  render();
}

// ── DRAG SORT (edit panel) ──
function initDragSort(){
  const body = document.getElementById('editBody');
  let dragEl = null, dragIdx = null, ghost = null;

  body.querySelectorAll('.edit-drag').forEach(handle => {
    handle.addEventListener('mousedown',  startDrag);
    handle.addEventListener('touchstart', startDrag, {passive:true});
  });

  function startDrag(e){
    const card = e.currentTarget.closest('.edit-card');
    dragEl = card; dragIdx = parseInt(card.dataset.idx);
    card.classList.add('edit-dragging');

    // ghost
    const r = card.getBoundingClientRect();
    ghost = card.cloneNode(true);
    ghost.style.cssText = `position:fixed;left:${r.left}px;top:${r.top}px;width:${r.width}px;opacity:.85;pointer-events:none;z-index:3000;background:var(--panel2);border:1.5px solid var(--accent);border-radius:10px;`;
    document.body.appendChild(ghost);
    _startY = e.touches ? e.touches[0].clientY : e.clientY;
    _startTop = r.top;

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
    document.addEventListener('touchmove', onMove, {passive:false});
    document.addEventListener('touchend',  onUp);
  }

  let _startY, _startTop;

  function onMove(e){
    if(!dragEl) return;
    e.preventDefault && e.preventDefault();
    const cy = e.touches ? e.touches[0].clientY : e.clientY;
    if(ghost) ghost.style.top = (_startTop + cy - _startY) + 'px';

    // find hovered card
    const cards = [...body.querySelectorAll('.edit-card')];
    cards.forEach(c=>c.classList.remove('edit-over'));
    const under = cards.find(c => {
      if(c === dragEl) return false;
      const cr = c.getBoundingClientRect();
      return cy >= cr.top && cy <= cr.bottom;
    });
    if(under){
      under.classList.add('edit-over');
      const toIdx = parseInt(under.dataset.idx);
      if(toIdx !== dragIdx){
        const [moved] = editDraft.splice(dragIdx, 1);
        editDraft.splice(toIdx, 0, moved);
        dragIdx = toIdx;
        renderEditPanel();
        dragEl = body.querySelectorAll('.edit-card')[dragIdx];
        if(dragEl) dragEl.classList.add('edit-dragging');
      }
    }
  }

  function onUp(){
    if(ghost){ ghost.remove(); ghost = null; }
    body.querySelectorAll('.edit-dragging').forEach(c=>c.classList.remove('edit-dragging'));
    body.querySelectorAll('.edit-over').forEach(c=>c.classList.remove('edit-over'));
    dragEl = null; dragIdx = null;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup',   onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend',  onUp);
  }
}

// ── LEGO FIGURE RENDER ──
function getLegoPartsCount(){
  const done = Object.values(state.done).filter(Boolean).length;
  const total = Math.max(state.tasks.length, 1);
  const fig = LEGO_FIGURES[state.figureIdx % LEGO_FIGURES.length];
  const numParts = fig.parts.length; // 5 parts per figure
  if(done === 0) return 0;
  if(done >= total) return numParts;
  // evenly spread: each part unlocks at done >= ceil(total * partIdx/numParts)
  for(let p = numParts; p >= 1; p--){
    if(done >= Math.ceil(total * p / numParts)) return p;
  }
  return 0;
}

function buildLegoSVG(scale, partsCount){
  const fig = LEGO_FIGURES[state.figureIdx % LEGO_FIGURES.length];
  let svg = '';
  for(let i = 0; i < partsCount && i < fig.parts.length; i++){
    svg += fig.parts[i];
  }
  // ghost outlines for locked parts
  for(let i = partsCount; i < fig.parts.length; i++){
    svg += `<g opacity="0.12">${fig.parts[i]}</g>`;
  }
  return svg;
}

function renderLegoMini(){
  const svgEl = document.getElementById('legoMiniSvg');
  const progEl = document.getElementById('legoProgress');
  const nameEl = document.getElementById('legoName');
  if(!svgEl) return;
  const done = Object.values(state.done).filter(Boolean).length;
  const total = state.tasks.length;
  const parts = getLegoPartsCount();
  svgEl.innerHTML = buildLegoSVG(1, parts);
  progEl.textContent = done + '/' + total + ' 미션 완료';
  const fig = LEGO_FIGURES[state.figureIdx % LEGO_FIGURES.length];
  nameEl.textContent = fig.name;
}

// Map done-count → which part was JUST unlocked (for popup)
// parts: 0=none, 1=head, 2=body, 3=legs
const PART_NAMES = ['HEAD', 'TORSO', 'ARMS', 'UPPER LEGS', 'COMPLETE!'];
const PART_MSGS  = [
  "Head unlocked!",
  "Torso assembled!",
  "Arms ready!",
  "Almost there!",
  "Full figure!",
];

// Show the part-unlock popup after a mission check
function showPartPopup(prevParts, newParts, figIdx){
  if(newParts <= prevParts) return; // no new part
  const fig = LEGO_FIGURES[figIdx % LEGO_FIGURES.length];
  const partIdx = newParts - 1; // 0,1,2

  const popupSvg = document.getElementById('partPopupSvg');
  const titleEl  = document.getElementById('partPopupTitle');
  const msgEl    = document.getElementById('partPopupMsg');
  if(!popupSvg) return;

  // Show ALL parts up to and including the new one (assembled so far)
  let svgContent = '';
  for(let i = 0; i <= partIdx; i++) svgContent += fig.parts[i];
  popupSvg.innerHTML = svgContent;

  titleEl.textContent = PART_NAMES[partIdx] + ' UNLOCKED!';
  msgEl.textContent   = PART_MSGS[partIdx];

  const popup = document.getElementById('partPopup');
  popup.classList.add('show');
  setTimeout(()=> popup.classList.remove('show'), 2200);
}

function renderLegoBig(){
  const svgEl = document.getElementById('legoBigSvg');
  const nameEl = document.getElementById('legoCompleteName');
  if(!svgEl) return;
  const fig = LEGO_FIGURES[state.figureIdx % LEGO_FIGURES.length];
  svgEl.innerHTML = buildLegoSVG(1, 3); // all parts
  nameEl.textContent = fig.name;
}

  };
  inp.addEventListener('blur', finish);
  inp.addEventListener('keydown', e=>{ if(e.key==='Enter') inp.blur(); });
}

// ── VOICE ──
let _voiceReady = false;

function pickVoice(){
  const voices = window.speechSynthesis.getVoices();
  if(!voices.length) return null;
  // Prefer enhanced/natural sounding en-US voices
  const checks = [
    v => v.lang==='en-US' && /enhanced|premium|natural|neural/i.test(v.name),
    v => v.lang==='en-US' && v.localService,
    v => v.lang.startsWith('en') && v.localService,
    v => v.lang.startsWith('en'),
  ];
  for(const fn of checks){ const v = voices.find(fn); if(v) return v; }
  return null;
}

function speak(text){
  if(!state.voiceEnabled) return;
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  setTimeout(()=>{
    // Strip any Korean characters before speaking
    const clean = text.replace(/[\u3131-\u314e\u314f-\u3163\uac00-\ud7a3]/g,'').replace(/\s+/g,' ').trim();
    if(!clean) return;
    const u = new SpeechSynthesisUtterance(clean);
    u.lang = 'en-US';
    u.rate = 0.88;
    u.pitch = 1.15;  // bright, upbeat teacher tone
    u.volume = 1;
    const voices = window.speechSynthesis.getVoices();
    const enVoice = voices.find(v => v.lang === 'en-US' && /enhanced|premium|natural|samantha|karen/i.test(v.name))
                 || voices.find(v => v.lang === 'en-US' && v.localService)
                 || voices.find(v => v.lang === 'en-US')
                 || voices.find(v => v.lang.startsWith('en'));
    if(enVoice) u.voice = enVoice;
    window.speechSynthesis.speak(u);
  }, 80);
}

function playMissionSound(){
  // short beep via Web Audio API regardless of voice setting
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const t = ctx.currentTime;
    const osc1 = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const gain = ctx.createGain();
    osc1.type = 'sine'; osc1.frequency.setValueAtTime(880, t); osc1.frequency.exponentialRampToValueAtTime(1200, t+0.08);
    osc2.type = 'sine'; osc2.frequency.setValueAtTime(1200, t+0.1); osc2.frequency.exponentialRampToValueAtTime(1600, t+0.2);
    gain.gain.setValueAtTime(0.3, t); gain.gain.exponentialRampToValueAtTime(0.001, t+0.35);
    osc1.connect(gain); osc2.connect(gain); gain.connect(ctx.destination);
    osc1.start(t); osc1.stop(t+0.1);
    osc2.start(t+0.1); osc2.stop(t+0.35);
  }catch(e){}
}

function playIntroSound(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const t = ctx.currentTime;
    [[440,.05],[554,.1],[659,.15],[880,.22]].forEach(([freq,delay])=>{
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine'; osc.frequency.value = freq;
      g.gain.setValueAtTime(0.18, t+delay);
      g.gain.exponentialRampToValueAtTime(0.001, t+delay+0.25);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(t+delay); osc.stop(t+delay+0.3);
    });
  }catch(e){}
}

// ── INTRO / START ──
function startApp(){
  const intro = document.getElementById('introScreen');
  intro.classList.add('fade-out');
  playIntroSound();
  setTimeout(()=>{
    intro.style.display='none';
    showJarvisGreeting();
  }, 600);
}

function showJarvisGreeting(){
  const overlay = document.getElementById('jarvisOverlay');
  const scan    = document.getElementById('jarvisScan');
  const l1 = document.getElementById('jLine1');
  const l2 = document.getElementById('jLine2');
  const l3 = document.getElementById('jLine3');

  const displayName = state.userName || '';
  const speakName = getSpeakName();
  l1.textContent = displayName ? 'Hello, ' + displayName + '!' : 'Hello, Agent!';
  l2.textContent = 'Welcome to';
  l3.textContent = 'Morning Mission System';

  overlay.classList.add('show');

  setTimeout(()=>{ scan.classList.add('show'); }, 200);
  setTimeout(()=>{ l1.classList.add('show'); }, 500);
  setTimeout(()=>{ l2.classList.add('show'); }, 900);
  setTimeout(()=>{ l3.classList.add('show'); }, 1300);

  // speak — only English, no Korean characters
  const greeting = speakName
    ? 'Hey ' + speakName + '! Good morning! Welcome to Morning Mission. Let\'s go!'
    : 'Good morning! Welcome to Morning Mission. Let\'s go!';
  setTimeout(()=>speak(greeting), 400);

  setTimeout(()=>{
    overlay.classList.remove('show');
    setTimeout(()=>{
      l1.classList.remove('show'); l2.classList.remove('show');
      l3.classList.remove('show'); scan.classList.remove('show');
    }, 400);
  }, 3800);
}

// ── SETTINGS ──
function openSettings(){
  document.getElementById('nameInput').value = state.userName;
  const von  = document.getElementById('voiceOnBtn');
  const voff = document.getElementById('voiceOffBtn');
  if(state.voiceEnabled){ von.classList.add('selected'); voff.classList.remove('selected'); }
  else{ voff.classList.add('selected'); von.classList.remove('selected'); }
  document.getElementById('settingsPanel').classList.add('show');
}
function closeSettings(){
  const name = document.getElementById('nameInput').value.trim();
  state.userName = name; saveName(name);
  document.getElementById('settingsPanel').classList.remove('show');
}
function setVoice(on){
  state.voiceEnabled = on; saveVoice(on);
  document.getElementById('voiceOnBtn').classList.toggle('selected', on);
  document.getElementById('voiceOffBtn').classList.toggle('selected', !on);
}

// ── INIT ──
if(!localStorage.getItem('ninjaFigIdx')){ localStorage.setItem('ninjaFigIdx',state.figureIdx); }
updateClock(); setInterval(updateClock,10000);
render(); renderTitle();

// update intro title text
const introTitleEl = document.getElementById('introTitle');
if(introTitleEl) introTitleEl.innerHTML = state.appTitle.replace(' ','<span> ')+'</span>';

// preload voices
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = ()=>{ window.speechSynthesis.getVoices(); _voiceReady=true; };
}
